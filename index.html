<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StockScreener Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0b0d14;color:#e2e8f0;font-family:system-ui,-apple-system,sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}
button{cursor:pointer;border:none;font-family:inherit}
input,select{font-family:inherit}

/* Layout */
#app{display:flex;flex-direction:column;min-height:100vh}
header{background:#0f1117;border-bottom:1px solid #1e2235;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center}
.logo span{color:#6366f1}
.search-wrap{position:relative;flex:1;max-width:400px}
.search-input{width:100%;background:#1a1d27;border:1px solid #2d3148;color:#e2e8f0;border-radius:8px;padding:8px 12px 8px 36px;font-size:14px;outline:none}
.search-input:focus{border-color:#6366f1}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b;pointer-events:none}
.search-dropdown{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#1a1d27;border:1px solid #2d3148;border-radius:8px;overflow:hidden;z-index:200}
.search-item{padding:10px 14px;cursor:pointer;font-size:13px;font-weight:600;font-family:monospace;color:#818cf8}
.search-item:hover{background:#6366f1;color:white}
nav{display:flex;gap:4px;flex-wrap:wrap}
.nav-btn{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;color:#94a3b8;background:transparent;transition:all .15s}
.nav-btn:hover{background:#1e2235;color:#e2e8f0}
.nav-btn.active{background:#6366f1;color:white}
.nav-live{display:flex;align-items:center;gap:5px}
.dot{width:7px;height:7px;border-radius:50%;background:#10b981;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

main{flex:1;padding:20px;max-width:1600px;margin:0 auto;width:100%}
footer{border-top:1px solid #1e2235;padding:12px 20px;display:flex;justify-content:space-between;font-size:12px;color:#475569}

/* Cards */
.card{background:#1a1d27;border:1px solid #2d3148;border-radius:12px}
.card-inner{background:#12151f;border:1px solid #252840;border-radius:8px;padding:16px}
.section-title{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}

/* Badges */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:rgba(16,185,129,.15);color:#10b981}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444}
.badge-yellow{background:rgba(245,158,11,.15);color:#f59e0b}
.badge-blue{background:rgba(99,102,241,.15);color:#818cf8}

/* Colors */
.up{color:#10b981}.down{color:#ef4444}
.score-ex{color:#10b981}.score-gd{color:#84cc16}.score-fa{color:#f59e0b}.score-po{color:#ef4444}

/* Table */
.table-wrap{overflow-x:auto}
table{border-collapse:collapse;width:100%}
th{background:#12151f;color:#64748b;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;padding:10px 12px;text-align:left;border-bottom:1px solid #2d3148;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #1e2235;font-size:13px}
tr:hover td{background:#1a1d27}
.sym{color:#818cf8;font-family:monospace;font-weight:700}

/* Metric bar */
.bar-wrap{background:#2d3148;border-radius:4px;overflow:hidden;height:6px;width:60px}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}

/* Spinner */
.spinner{width:32px;height:32px;border:3px solid #2d3148;border-top-color:#6366f1;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;padding:60px 0;color:#64748b}

/* Score ring */
.ring-wrap{display:flex;flex-direction:column;align-items:center;gap:4px}

/* Grid layouts */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.grid6{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
.grid-auto{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px}
@media(max-width:900px){.grid3{grid-template-columns:1fr 1fr}.grid6{grid-template-columns:repeat(3,1fr)}}
@media(max-width:600px){.grid2,.grid3,.grid4,.grid6{grid-template-columns:1fr}}

/* Stock card (overview grid) */
.stock-card{background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:12px;cursor:pointer;transition:transform .15s,border-color .15s}
.stock-card:hover{transform:translateY(-2px);border-color:#6366f1}

/* Index card */
.idx-card{background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:12px}

/* Tabs */
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tab-btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;color:#94a3b8;background:transparent;transition:all .15s}
.tab-btn:hover{background:#1e2235;color:#e2e8f0}
.tab-btn.active{background:#6366f1;color:white}

/* Analysis header */
.stock-header{display:flex;flex-wrap:wrap;gap:16px;align-items:center;justify-content:space-between;padding:20px}
.stock-avatar{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:white;flex-shrink:0}
.price-big{font-size:28px;font-weight:700}
.change-big{font-size:16px;font-weight:600}

/* Score breakdown */
.score-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.score-label{font-size:12px;color:#94a3b8;flex:1}
.score-num{font-size:12px;font-weight:600;min-width:28px;text-align:right}
.score-bar{flex:2;background:#2d3148;border-radius:4px;overflow:hidden;height:6px}
.score-bar-fill{height:100%;border-radius:4px;transition:width .6s}

/* Strength/weakness cards */
.sw-card{background:#12151f;border-radius:8px;padding:14px;display:flex;gap:12px;align-items:flex-start}
.sw-icon{font-size:18px;line-height:1;flex-shrink:0;margin-top:1px}
.sw-text{font-size:13px;color:#e2e8f0;line-height:1.5}
.sw-metric{font-size:11px;color:#64748b;margin-top:3px}
.s-left{border-left:3px solid #10b981}
.s-weak{border-left:3px solid #ef4444}
.s-neutral{border-left:3px solid #f59e0b}

/* Fundamentals grid */
.fund-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1e2235;font-size:13px}
.fund-row:last-child{border-bottom:none}
.fund-label{color:#94a3b8}
.fund-val{font-weight:600}

/* Watchlist card */
.wl-card{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:16px;cursor:pointer;transition:border-color .15s}
.wl-card:hover{border-color:#6366f1}

/* Selects / inputs */
select,input[type=text]{background:#1a1d27;border:1px solid #2d3148;color:#e2e8f0;border-radius:8px;padding:8px 12px;font-size:13px;outline:none}
select:focus,input[type=text]:focus{border-color:#6366f1}

/* Buttons */
.btn{padding:8px 18px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn-primary{background:#6366f1;color:white}
.btn-ghost{background:#1e2235;color:#94a3b8;border:1px solid #2d3148}
.btn-sm{padding:5px 12px;font-size:12px;border-radius:6px;background:#1e2235;color:#6366f1;border:none;cursor:pointer}

/* Watchlist star */
.star{font-size:20px;cursor:pointer;background:none;border:none;line-height:1;padding:0}

/* Chart container */
.chart-container{position:relative;height:280px}
.chart-ranges{display:flex;gap:6px}
.range-btn{padding:4px 12px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;background:#1e2235;color:#94a3b8;border:none;transition:all .15s}
.range-btn.active{background:#6366f1;color:white}

/* Empty state */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px}
.empty-title{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-sub{font-size:14px;color:#64748b}

/* Filter row */
.filter-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}

/* Settings */
.settings-section{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;padding:20px;margin-bottom:16px;max-width:560px}
.settings-section h3{font-size:15px;font-weight:600;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:#94a3b8;margin-bottom:5px}
.field input{width:100%}
.field-note{font-size:12px;color:#64748b;margin-top:5px}
.status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}
/* News */
.news-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px}
.news-card{background:#1a1d27;border:1px solid #2d3148;border-radius:12px;overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,transform .15s;cursor:pointer}
.news-card:hover{border-color:#6366f1;transform:translateY(-2px)}
.news-card-img{width:100%;height:160px;object-fit:cover;background:#12151f;display:block}
.news-card-img-placeholder{width:100%;height:160px;background:linear-gradient(135deg,#1e2235,#12151f);display:flex;align-items:center;justify-content:center;font-size:36px}
.news-card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:8px}
.news-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.news-source{font-size:11px;font-weight:700;color:#6366f1;text-transform:uppercase;letter-spacing:.04em}
.news-time{font-size:11px;color:#64748b}
.news-title{font-size:14px;font-weight:600;color:#e2e8f0;line-height:1.45;text-decoration:none;display:block}
.news-title:hover{color:#818cf8}
.news-snippet{font-size:12px;color:#64748b;line-height:1.55;flex:1}
.news-footer{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.news-ticker{background:rgba(99,102,241,.15);color:#818cf8;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;font-family:monospace}
.news-ticker-uk{background:rgba(16,185,129,.1);color:#10b981}
.news-read{margin-left:auto;font-size:11px;color:#64748b;white-space:nowrap}
.news-hero{grid-column:1/-1;display:flex;gap:0;border-radius:12px;overflow:hidden;border:1px solid #2d3148;background:#1a1d27;cursor:pointer;transition:border-color .15s}
.news-hero:hover{border-color:#6366f1}
.news-hero-img{width:420px;flex-shrink:0;object-fit:cover;background:#12151f;min-height:220px}
.news-hero-body{padding:20px;display:flex;flex-direction:column;gap:10px;justify-content:center}
.news-hero-title{font-size:18px;font-weight:700;color:#e2e8f0;line-height:1.4;text-decoration:none}
.news-hero-title:hover{color:#818cf8}
.news-hero-snippet{font-size:13px;color:#94a3b8;line-height:1.6}
.news-filter-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.news-empty{text-align:center;padding:60px 20px;color:#64748b}
.skeleton{background:linear-gradient(90deg,#1a1d27 25%,#1e2235 50%,#1a1d27 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.source-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
@media(max-width:700px){.news-hero{flex-direction:column}.news-hero-img{width:100%;height:180px}}
@keyframes flashUp{0%{background:rgba(16,185,129,.3)}100%{background:transparent}}
@keyframes flashDown{0%{background:rgba(239,68,68,.3)}100%{background:transparent}}
.flash-up{animation:flashUp .8s ease}
.flash-down{animation:flashDown .8s ease}
.live-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:#10b981;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600}
.closed-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:#f59e0b;border-radius:20px;padding:2px 10px;font-size:11px;font-weight:600}
.refresh-btn{background:none;border:1px solid #2d3148;color:#64748b;border-radius:6px;padding:3px 8px;font-size:11px;cursor:pointer;transition:all .15s}
.refresh-btn:hover{border-color:#6366f1;color:#6366f1}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="logo">
      <div class="logo-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
      </div>
      StockScreener <span>Pro</span>
    </div>

    <div class="search-wrap">
      <span class="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </span>
      <input id="searchInput" class="search-input" placeholder="Search symbol e.g. AAPL, MSFT…" autocomplete="off"/>
      <div id="searchDropdown" class="search-dropdown"></div>
    </div>

    <nav>
      <button class="nav-btn active" data-tab="overview">Overview</button>
      <button class="nav-btn" data-tab="screener">Screener</button>
      <button class="nav-btn" data-tab="news">News</button>
      <button class="nav-btn" data-tab="watchlist">Watchlist</button>
      <button class="nav-btn" data-tab="settings">Settings</button>
      <button class="nav-btn" data-tab="analysis" id="analysisTab" style="display:none">
        <span class="nav-live"><span class="dot"></span><span id="analysisLabel">–</span></span>
      </button>
    </nav>
  </header>

  <main id="main"></main>

  <footer>
    <span>StockScreener Pro — For educational use only. Not financial advice.</span>
    <span style="display:flex;align-items:center;gap:10px">
      <span id="marketStatus"></span>
      <span id="lastUpdated" style="color:#475569;font-size:12px"></span>
      <span id="dataMode">Demo data</span>
    </span>
  </footer>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const TD  = 'https://api.twelvedata.com';   // Twelve Data — prices & history (free tier, CORS ok)
const FMP = 'https://financialmodelingprep.com/api/v3'; // FMP — fundamentals only (optional)
const TD_BATCH_SIZE       = 8;        // TD free tier: 8 credits/min, 1 credit = 1 symbol
const PRICE_REFRESH_MS    = 65_000;   // 65s between batches — 1 batch of 8 per minute
const ANALYSIS_REFRESH_MS = 65_000;
const FUND_CACHE_MS       = 600_000;
const NEWS_CACHE_MS       = 300_000;
// US symbols
const US_SYMBOLS = ['AAPL','MSFT','GOOGL','AMZN','NVDA','META','TSLA','BRK-B','JPM','JNJ',
  'V','PG','UNH','MA','HD','CVX','MRK','ABBV','PEP','KO',
  'AVGO','COST','LLY','TMO','MCD','DIS','ACN','DHR','NEE','IBM',
  'NFLX','ADBE','CRM','AMD','INTC','QCOM','TXN','AMAT','ORCL','PYPL'];

// UK symbols — prices returned in pence (GBp) by FMP
const UK_FTSE100 = ['SHEL.L','AZN.L','HSBA.L','ULVR.L','BP.L','RIO.L','GSK.L','LSEG.L',
  'REL.L','DGE.L','LLOY.L','BARC.L','NG.L','BA.L','RR.L','TSCO.L',
  'STAN.L','NWG.L','PRU.L','III.L','IMB.L','CPG.L','EXPN.L','WPP.L','VOD.L'];
const UK_FTSE250 = ['EZJ.L','ITV.L','OCDO.L','JDW.L','MNG.L','HLN.L','SMWH.L','ABF.L','TUI.L','AUTO.L'];
const UK_AIM     = ['FEVR.L','BOO.L','KWS.L','GAMA.L','BCPT.L'];
const ALL_UK     = [...UK_FTSE100, ...UK_FTSE250, ...UK_AIM];

// Combined — used for batch refresh when market = 'all'
const SYMBOLS = [...US_SYMBOLS];  // default; extended dynamically when UK loaded
const ALL_SYMBOLS = [...US_SYMBOLS, ...ALL_UK];

// Which index each UK symbol belongs to (for display)
const UK_INDEX_MAP = {};
UK_FTSE100.forEach(s => UK_INDEX_MAP[s] = 'FTSE 100');
UK_FTSE250.forEach(s => UK_INDEX_MAP[s] = 'FTSE 250');
UK_AIM.forEach(s    => UK_INDEX_MAP[s] = 'AIM');

const SECTORS = ['Technology','Healthcare','Financials','Consumer Discretionary','Industrials',
  'Energy','Utilities','Materials','Real Estate','Communication Services','Consumer Staples'];

const US_INDICES = [
  {name:'S&P 500',   short:'SPX', base:5200,  fmpSymbol:'^GSPC'},
  {name:'NASDAQ',    short:'NDX', base:16400, fmpSymbol:'^IXIC'},
  {name:'Dow Jones', short:'DJIA',base:39800, fmpSymbol:'^DJI'},
  {name:'Russell 2000',short:'RUT',base:2050, fmpSymbol:'^RUT'},
];
const UK_INDICES = [
  {name:'FTSE 100',   short:'UKX', base:8100, fmpSymbol:'^FTSE'},
  {name:'FTSE 250',   short:'MCX', base:20500,fmpSymbol:'^FTMC'},
  {name:'FTSE SmallCap',short:'SMX',base:5900,fmpSymbol:'^FTSC'},
  {name:'AIM All-Share',short:'AIM',base:740, fmpSymbol:'^AIM'},
];

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  tab: 'overview',
  tdApiKey:  localStorage.getItem('td_key')  || '',  // Twelve Data — prices (primary)
  apiKey:    localStorage.getItem('fmp_key') || '',  // FMP — fundamentals (optional)
  watchlist: JSON.parse(localStorage.getItem('watchlist') || '["AAPL","MSFT","NVDA","TSLA"]'),
  screenerData: [],
  marketData: [],
  selectedSymbol: null,
  selectedStock: null,
  selectedHistory: null,
  analysisTab: 'overview',
  chartRange: 180,
  chartObj: null,
  radarObj: null,
  screenerSort: {by:'score',dir:'desc'},
  screenerFilter: {sector:'',minScore:0,market:'all'},
  // auto-refresh
  priceTimer: null,
  analysisTimer: null,
  clockTimer: null,
  lastRefresh: null,
  priceBatchIndex: 0,   // which batch of 8 symbols to fetch next
  // fundamentals cache: { [symbol]: { data, ts } }
  fundCache: {},
  // news cache: { [key]: { data, ts } }
  newsCache: {},
  newsFilter: 'all',   // 'all' | 'us' | 'uk' | 'watchlist'
  newsTimer: null,
  newsLastRefresh: null,
};

// ─── MOCK DATA ────────────────────────────────────────────────────────────────
function seedRng(str) {
  let h = 0;
  for (let i=0;i<str.length;i++) h = Math.imul(31,h)+str.charCodeAt(i)|0;
  return function(){ h^=h<<13;h^=h>>17;h^=h<<5; return (h>>>0)/4294967296; };
}

function isUK(sym) { return sym.endsWith('.L'); }

// Price display — UK stocks quoted in pence on LSE
function fPrice(n, sym) {
  if (n == null || isNaN(n)) return 'N/A';
  if (isUK(sym)) return n.toFixed(0) + 'p';
  return '$' + n.toFixed(2);
}
function fMktCap(n, sym) {
  if (n == null || isNaN(n)) return 'N/A';
  const prefix = isUK(sym) ? '£' : '$';
  // UK market caps from FMP are in GBP (not pence)
  if (Math.abs(n) >= 1e12) return prefix + (n/1e12).toFixed(2) + 'T';
  if (Math.abs(n) >= 1e9)  return prefix + (n/1e9).toFixed(2) + 'B';
  if (Math.abs(n) >= 1e6)  return prefix + (n/1e6).toFixed(2) + 'M';
  return prefix + n.toFixed(0);
}

function mockStock(sym) {
  const r = seedRng(sym + '2025');
  // UK base prices in pence
  const bases = {
    // US prices — approximate mid-2025 values (demo only; live prices come from API)
    AAPL:213,MSFT:452,GOOGL:178,AMZN:202,NVDA:135,META:612,TSLA:248,JPM:236,JNJ:161,V:295,
    NFLX:720,ADBE:420,'BRK-B':468,UNH:590,MA:530,HD:392,CVX:158,MRK:98,ABBV:192,PEP:153,
    KO:71,AVGO:185,COST:930,LLY:825,TMO:498,MCD:293,DIS:118,ACN:328,DHR:225,NEE:74,
    IBM:238,CRM:296,AMD:142,INTC:22,QCOM:185,TXN:192,AMAT:195,ORCL:148,PYPL:75,PG:168,
    'SHEL.L':2780,'AZN.L':10540,'HSBA.L':695,'ULVR.L':3820,'BP.L':453,'RIO.L':5180,'GSK.L':1695,
    'LSEG.L':9480,'REL.L':3410,'DGE.L':2290,'LLOY.L':55,'BARC.L':228,'NG.L':948,'BA.L':1248,
    'RR.L':498,'TSCO.L':362,'STAN.L':847,'NWG.L':378,'PRU.L':752,'III.L':2980,'IMB.L':2490,

function mockHistory(basePrice, days) {
  const r = seedRng(String(basePrice.toFixed(0))+days);
  const out = []; let p = basePrice*0.8;
  const now = Date.now();
  for (let i=days;i>=0;i--) {
    p = Math.max(1, p*(1+(r()-0.48)*0.025));
    const d = new Date(now - i*86400000);
    out.push({date:d.toISOString().slice(0,10), close:p});
  }
  return out;
}

// ─── SCORING ─────────────────────────────────────────────────────────────────
function score(stock) {
  const s={}, strengths=[], weaknesses=[], neutral=[];

  // Valuation
  let v=50;
  if(stock.pe!=null){if(stock.pe<15){v+=20;strengths.push({text:`Low P/E ratio (${stock.pe.toFixed(1)}x) — potentially undervalued`,metric:'P/E'})}else if(stock.pe<25){v+=8;neutral.push({text:`Moderate P/E ratio (${stock.pe.toFixed(1)}x)`,metric:'P/E'})}else if(stock.pe>50){v-=18;weaknesses.push({text:`High P/E ratio (${stock.pe.toFixed(1)}x) — expensive valuation`,metric:'P/E'})}}
  if(stock.pb!=null){if(stock.pb<1.5){v+=12;strengths.push({text:`Below book value (P/B: ${stock.pb.toFixed(2)}x)`,metric:'P/B'})}else if(stock.pb>8){v-=10;weaknesses.push({text:`High price-to-book (P/B: ${stock.pb.toFixed(2)}x)`,metric:'P/B'})}}
  if(stock.evToEbitda!=null){if(stock.evToEbitda<10){v+=10;strengths.push({text:`Attractive EV/EBITDA multiple (${stock.evToEbitda.toFixed(1)}x)`,metric:'EV/EBITDA'})}else if(stock.evToEbitda>25){v-=10;weaknesses.push({text:`Expensive EV/EBITDA (${stock.evToEbitda.toFixed(1)}x)`,metric:'EV/EBITDA'})}}
  s.valuation=clamp(v);

  // Profitability
  let p2=40;
  if(stock.netMargin!=null){if(stock.netMargin>20){p2+=25;strengths.push({text:`Excellent net margin (${stock.netMargin.toFixed(1)}%)`,metric:'Net Margin'})}else if(stock.netMargin>10){p2+=14;neutral.push({text:`Good net margin (${stock.netMargin.toFixed(1)}%)`,metric:'Net Margin'})}else if(stock.netMargin<0){p2-=20;weaknesses.push({text:`Negative net margin (${stock.netMargin.toFixed(1)}%) — currently unprofitable`,metric:'Net Margin'})}else p2+=4}
  if(stock.roe!=null){if(stock.roe>20){p2+=18;strengths.push({text:`High return on equity (${stock.roe.toFixed(1)}%)`,metric:'ROE'})}else if(stock.roe>10){p2+=8;neutral.push({text:`Moderate ROE (${stock.roe.toFixed(1)}%)`,metric:'ROE'})}else if(stock.roe<5){p2-=10;weaknesses.push({text:`Weak return on equity (${stock.roe.toFixed(1)}%)`,metric:'ROE'})}}
  if(stock.grossMargin>40){p2+=8;strengths.push({text:`Strong gross margins (${stock.grossMargin.toFixed(1)}%)`,metric:'Gross Margin'})}
  s.profitability=clamp(p2);

  // Growth
  let g=50;
  if(stock.revenueGrowth!=null){if(stock.revenueGrowth>20){g+=25;strengths.push({text:`Strong revenue growth (${stock.revenueGrowth.toFixed(1)}% YoY)`,metric:'Revenue Growth'})}else if(stock.revenueGrowth>10){g+=14;neutral.push({text:`Solid revenue growth (${stock.revenueGrowth.toFixed(1)}% YoY)`,metric:'Revenue Growth'})}else if(stock.revenueGrowth<0){g-=18;weaknesses.push({text:`Revenue declining (${stock.revenueGrowth.toFixed(1)}% YoY)`,metric:'Revenue Growth'})}}
  if(stock.earningsGrowth!=null){if(stock.earningsGrowth>20){g+=18;strengths.push({text:`Strong earnings growth (${stock.earningsGrowth.toFixed(1)}% YoY)`,metric:'EPS Growth'})}else if(stock.earningsGrowth<-10){g-=14;weaknesses.push({text:`Earnings declining (${stock.earningsGrowth.toFixed(1)}% YoY)`,metric:'EPS Growth'})}}
  s.growth=clamp(g);

  // Health
  let h=50;
  if(stock.currentRatio!=null){if(stock.currentRatio>2){h+=18;strengths.push({text:`Strong current ratio (${stock.currentRatio.toFixed(2)}x) — good liquidity`,metric:'Current Ratio'})}else if(stock.currentRatio<1){h-=20;weaknesses.push({text:`Current ratio below 1 (${stock.currentRatio.toFixed(2)}x) — liquidity risk`,metric:'Current Ratio'})}}
  if(stock.debtToEquity!=null){if(stock.debtToEquity<0.3){h+=18;strengths.push({text:`Low debt-to-equity (${stock.debtToEquity.toFixed(2)}x) — conservative balance sheet`,metric:'D/E Ratio'})}else if(stock.debtToEquity>2){h-=18;weaknesses.push({text:`High leverage (D/E: ${stock.debtToEquity.toFixed(2)}x)`,metric:'D/E Ratio'})}else if(stock.debtToEquity>1){h-=8;weaknesses.push({text:`Elevated debt levels (D/E: ${stock.debtToEquity.toFixed(2)}x)`,metric:'D/E Ratio'})}}
  if(stock.interestCoverage!=null){if(stock.interestCoverage>10){h+=8;strengths.push({text:`Strong interest coverage (${stock.interestCoverage.toFixed(1)}x)`,metric:'Interest Coverage'})}else if(stock.interestCoverage<2){h-=14;weaknesses.push({text:`Weak interest coverage (${stock.interestCoverage.toFixed(1)}x) — debt service risk`,metric:'Interest Coverage'})}}
  s.health=clamp(h);

  // Dividend
  let d=50;
  if(stock.dividendYield>4){d+=20;strengths.push({text:`High dividend yield (${stock.dividendYield.toFixed(2)}%)`,metric:'Dividend'})}
  else if(stock.dividendYield>2){d+=10;neutral.push({text:`Moderate dividend yield (${stock.dividendYield.toFixed(2)}%)`,metric:'Dividend'})}
  else if(!stock.dividendYield||stock.dividendYield<0.1){d=40;neutral.push({text:'No dividend — growth-oriented capital allocation',metric:'Dividend'})}
  s.dividend=clamp(d);

  // Momentum
  let m=50;
  if(stock.week52High&&stock.week52Low&&stock.price){
    const range=stock.week52High-stock.week52Low;
    const pos=range>0?(stock.price-stock.week52Low)/range:0.5;
    if(pos>0.8){m+=18;strengths.push({text:`Near 52-week high (${(pos*100).toFixed(0)}% of range) — strong momentum`,metric:'Momentum'})}
    else if(pos<0.2){m-=10;weaknesses.push({text:`Near 52-week low (${(pos*100).toFixed(0)}% of range)`,metric:'Momentum'})}
    else neutral.push({text:`Mid-range price (${(pos*100).toFixed(0)}% of 52-week range)`,metric:'Momentum'});
  }
  s.momentum=clamp(m);

  s.overall=Math.round(s.valuation*.25+s.profitability*.25+s.growth*.20+s.health*.20+s.dividend*.05+s.momentum*.05);
  return {scores:s, details:{strengths,weaknesses,neutral}};
}

function clamp(v){return Math.max(0,Math.min(100,Math.round(v)))}
function scoreColor(v){return v>=75?'#10b981':v>=60?'#84cc16':v>=45?'#f59e0b':'#ef4444'}
function scoreClass(v){return v>=75?'score-ex':v>=60?'score-gd':v>=45?'score-fa':'score-po'}
function scoreLabel(v){return v>=75?'Excellent':v>=60?'Good':v>=45?'Fair':'Poor'}
function scoreBadge(v){return v>=60?'badge-green':v>=45?'badge-yellow':'badge-red'}

// ─── FORMATTERS ───────────────────────────────────────────────────────────────
function fP(n,sym){
  if(n==null||isNaN(n))return'N/A';
  if(sym&&isUK(sym))return n>=100?n.toFixed(0)+'p':n.toFixed(2)+'p';
  return'$'+n.toFixed(2);
}
function fPct(n){return n==null||isNaN(n)?'N/A':n.toFixed(2)+'%'}
function fX(n){return n==null||isNaN(n)?'N/A':n.toFixed(2)+'x'}
function fBig(n,sym){
  if(n==null||isNaN(n))return'N/A';
  const pre=sym&&isUK(sym)?'£':'$';
  if(Math.abs(n)>=1e12)return pre+(n/1e12).toFixed(2)+'T';
  if(Math.abs(n)>=1e9)return pre+(n/1e9).toFixed(2)+'B';
  if(Math.abs(n)>=1e6)return pre+(n/1e6).toFixed(2)+'M';
  return pre+n.toFixed(0);
}
function fVol(n){
  if(!n)return'N/A';
  if(n>=1e9)return(n/1e9).toFixed(2)+'B';
  if(n>=1e6)return(n/1e6).toFixed(2)+'M';
  if(n>=1e3)return(n/1e3).toFixed(0)+'K';
  return String(n);
}

// ─── SVG RING ─────────────────────────────────────────────────────────────────
function ringHTML(score, size=80) {
  const r = size/2-7, c = 2*Math.PI*r;
  const fill = (score/100)*c;
  const col = scoreColor(score);
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#2d3148" stroke-width="6"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="6"
      stroke-dasharray="${fill} ${c}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})"/>
    <text x="${size/2}" y="${size/2+5}" text-anchor="middle" fill="${col}"
      font-size="${size>60?17:12}" font-weight="700">${score}</text>
  </svg>`;
}

}

// ─── CHARTS ──────────────────────────────────────────────────────────────────
function renderPriceChart(history) {
  if(state.chartObj){state.chartObj.destroy();state.chartObj=null}
  const canvas = document.getElementById('priceChart');
  if(!canvas||!history?.length) return;
  const first=history[0].close, last=history[history.length-1].close;
  const col = last>=first?'#10b981':'#ef4444';
  const ctx=canvas.getContext('2d');
  const grad=ctx.createLinearGradient(0,0,0,280);
  grad.addColorStop(0,col+'50'); grad.addColorStop(1,col+'00');
  state.chartObj = new Chart(ctx,{
    type:'line',
    data:{labels:history.map(d=>d.date),datasets:[{label:'Price',data:history.map(d=>d.close),borderColor:col,borderWidth:2,fill:true,backgroundColor:grad,pointRadius:0,tension:.3}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{mode:'index',intersect:false,backgroundColor:'#1a1d27',borderColor:'#2d3148',borderWidth:1,titleColor:'#94a3b8',bodyColor:'#e2e8f0',callbacks:{label:ctx=>'$'+ctx.raw.toFixed(2)}}},scales:{x:{grid:{color:'#1e2235'},ticks:{color:'#475569',maxTicksLimit:8,font:{size:11}}},y:{grid:{color:'#1e2235'},ticks:{color:'#475569',callback:v=>'$'+v.toFixed(0),font:{size:11}},position:'right'}}}
  });
}

function renderRadarChart(scores) {
  if(state.radarObj){state.radarObj.destroy();state.radarObj=null}
  const canvas = document.getElementById('radarChart');
  if(!canvas) return;
  state.radarObj = new Chart(canvas.getContext('2d'),{
    type:'radar',
    data:{labels:['Valuation','Profitability','Growth','Health','Dividend','Momentum'],datasets:[{data:[scores.valuation,scores.profitability,scores.growth,scores.health,scores.dividend,scores.momentum],borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,0.15)',borderWidth:2,pointBackgroundColor:'#6366f1',pointRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{r:{min:0,max:100,grid:{color:'#2d3148'},angleLines:{color:'#2d3148'},ticks:{display:false},pointLabels:{color:'#94a3b8',font:{size:11}}}}}
  });
}

// ─── SCREENER ─────────────────────────────────────────────────────────────────
function renderScreener(main) {
  if (!state.screenerData.length) {
    state.screenerData = ALL_SYMBOLS.map(s => { const d=mockStock(s); const {scores}=score(d); return {...d,scores}; });
  }

  let data = [...state.screenerData];
  const mf = state.screenerFilter.market || 'all';
  if (mf === 'us') data = data.filter(s => s.market === 'US');
  if (mf === 'uk') data = data.filter(s => s.market === 'UK');
  // UK sub-index filter
  if (mf === 'ftse100') data = data.filter(s => UK_FTSE100.includes(s.symbol));
  if (mf === 'ftse250') data = data.filter(s => UK_FTSE250.includes(s.symbol));
  if (mf === 'aim')     data = data.filter(s => UK_AIM.includes(s.symbol));
  if (state.screenerFilter.sector)   data = data.filter(s => s.sector === state.screenerFilter.sector);
  if (state.screenerFilter.minScore > 0) data = data.filter(s => s.scores.overall >= state.screenerFilter.minScore);

  data.sort((a,b) => {
    let av, bv;
    if (state.screenerSort.by==='score')     { av=a.scores.overall; bv=b.scores.overall }
    else if (state.screenerSort.by==='marketCap') { av=a.marketCap; bv=b.marketCap }
    else if (state.screenerSort.by==='pe')   { av=a.pe||999; bv=b.pe||999 }
    else { av=a.changePercent; bv=b.changePercent }
    return state.screenerSort.dir==='desc' ? bv-av : av-bv;
  });

  const mktOpts = [
    ['all','All Markets'],['us','🇺🇸 US'],['uk','🇬🇧 All UK'],
    ['ftse100','FTSE 100'],['ftse250','FTSE 250'],['aim','AIM'],
  ].map(([v,l]) => `<option value="${v}" ${mf===v?'selected':''}>${l}</option>`).join('');

  const sectorOpts = SECTORS.map(s=>`<option value="${s}" ${state.screenerFilter.sector===s?'selected':''}>${s}</option>`).join('');
  const scoreOpts  = [[0,'Any Score'],[60,'≥ 60'],[70,'≥ 70'],[80,'≥ 80']].map(([v,l])=>`<option value="${v}" ${state.screenerFilter.minScore===v?'selected':''}>${l}</option>`).join('');
  const sortOpts   = [['score','Overall Score'],['marketCap','Market Cap'],['pe','P/E Ratio'],['changePercent','% Change']].map(([v,l])=>`<option value="${v}" ${state.screenerSort.by===v?'selected':''}>${l}</option>`).join('');

  const rows = data.map(s => {
    const up = s.changePercent >= 0;
    const {overall,valuation,profitability,growth,health} = s.scores;
    const displaySym  = s.market==='UK' ? s.symbol.replace('.L','') : s.symbol;
    const hasFullData = !!s._liveFundamentals || !state.apiKey; // full data loaded
    const mktBadge    = s.market==='UK'
      ? `<span class="badge badge-blue" style="font-size:9px;margin-left:4px">${UK_INDEX_MAP[s.symbol]||'LSE'}</span>`
      : `<span class="badge" style="font-size:9px;margin-left:4px;background:rgba(16,185,129,.1);color:#10b981">NYSE/NDQ</span>`;

    // Score cell — greyed out with '?' if fundamentals not yet loaded for this stock
    function scoreCell(v, needsFund=true) {
      if (needsFund && !hasFullData) {
        return `<td><div style="display:flex;align-items:center;gap:6px;opacity:.35">
          <span style="color:#64748b;font-size:12px;min-width:24px">—</span>
          ${barHTML(50,'#2d3148')}
        </div></td>`;
      }
      return `<td><div style="display:flex;align-items:center;gap:6px">
        <span style="color:${scoreColor(v)};font-weight:600;font-size:12px;min-width:24px">${v}</span>
        ${barHTML(v,scoreColor(v))}
      </div></td>`;
    }

    const overallBadge = hasFullData
      ? `<span class="badge ${scoreBadge(overall)}" style="font-size:13px;padding:3px 10px">${overall}</span>`
      : `<span class="badge badge-yellow" style="font-size:11px;padding:3px 10px" title="Click Analyse for full score">P/E only</span>`;

    return `<tr onclick="analyzeStock('${s.symbol}')" style="cursor:pointer">
      <td class="sym">${displaySym}${mktBadge}</td>
      <td style="color:#94a3b8;max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${s.name||'—'}</td>
      <td>${fP(s.price,s.symbol)}</td>
      <td class="${up?'up':'down'}">${up?'+':''}${fPct(s.changePercent)}</td>
      <td style="color:#94a3b8">${fBig(s.marketCap,s.symbol)}</td>
      <td style="color:#94a3b8">${s.pe?s.pe.toFixed(1)+'x':'N/A'}</td>
      <td><span class="badge badge-blue" style="font-size:10px">${(s.sector||'—').split(' ')[0]}</span></td>
      ${scoreCell(valuation)}${scoreCell(profitability)}${scoreCell(growth)}${scoreCell(health)}
      <td>${overallBadge}</td>
      <td><button class="btn-sm" onclick="event.stopPropagation();analyzeStock('${s.symbol}')">Analyse →</button></td>
    </tr>`;
  }).join('');

  main.innerHTML = `
    <div class="filter-row">
      <span style="font-size:16px;font-weight:700">Stock Screener</span>
      <select onchange="screenerFilter('market',this.value)">${mktOpts}</select>
      <select onchange="screenerFilter('sector',this.value)"><option value="">All Sectors</option>${sectorOpts}</select>
      <select onchange="screenerFilter('minScore',+this.value)">${scoreOpts}</select>
      <select onchange="screenerSort('by',this.value)">${sortOpts}</select>
      <button class="btn btn-ghost" onclick="screenerSort('dir',null)" style="font-size:13px">${state.screenerSort.dir==='desc'?'↓ Desc':'↑ Asc'}</button>
      <span style="font-size:13px;color:#64748b">${data.length} stocks</span>
      <button class="refresh-btn" onclick="manualRefresh()">↻ Refresh</button>
      ${state.lastRefresh?`<span style="font-size:11px;color:#64748b">Updated ${Math.round((Date.now()-state.lastRefresh)/1000)}s ago</span>`:''}
    </div>
    <div class="card table-wrap">
      <table>
        <thead><tr><th>Symbol</th><th>Name</th><th>Price</th><th>Change</th><th>Mkt Cap</th><th>P/E</th><th>Sector</th><th>Valuation</th><th>Profitability</th><th>Growth</th><th>Health</th><th style="color:#818cf8">Overall</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ─── NEWS RENDER ─────────────────────────────────────────────────────────────
function renderNews(main, articles) {
  const f = state.newsFilter;
  const isDemo = !state.apiKey;

  const filterBtns = [
    ['all','📰 All News'], ['us','🇺🇸 US Markets'], ['uk','🇬🇧 UK Markets'], ['watchlist','⭐ Watchlist'],
  ].map(([v,l]) => `<button onclick="setNewsFilter('${v}')" class="tab-btn ${f===v?'active':''}" style="font-size:12px;padding:5px 14px">${l}</button>`).join('');

  const ago = state.newsLastRefresh ? timeAgo(new Date(state.newsLastRefresh).toISOString()) : null;

  function articleCard(a, hero=false) {
    const col   = sourceColor(a.site);
    const sym   = a.symbol || '';
    const syms  = sym.split(',').map(s=>s.trim()).filter(Boolean);
    const tickers = syms.map(s => {
      const uk = s.endsWith('.L');
      return `<span class="news-ticker ${uk?'news-ticker-uk':''}">${s.replace('.L','')}</span>`;
    }).join('');
    const imgEl = a.image
      ? `<img class="${hero?'news-hero-img':'news-card-img'}" src="${a.image}" loading="lazy" onerror="this.style.display='none'">`
      : `<div class="${hero?'news-hero-img':'news-card-img-placeholder'}">📰</div>`;

    if (hero) return `
      <a class="news-hero" href="${a.url!=='#'?a.url:'javascript:void(0)'}" target="${a.url!=='#'?'_blank':'_self'}" rel="noopener noreferrer">
        ${imgEl}
        <div class="news-hero-body">
          <div class="news-meta">
            <span class="news-source" style="color:${col}">${a.site}</span>
            <span class="news-time">${timeAgo(a.publishedDate)}</span>
          </div>
          <span class="news-hero-title">${a.title}</span>
          <p class="news-hero-snippet">${(a.text||'').slice(0,200)}${a.text?.length>200?'…':''}</p>
          <div class="news-footer">${tickers}<span class="news-read">Read full article →</span></div>
        </div>
      </a>`;

    return `
      <a class="news-card" href="${a.url!=='#'?a.url:'javascript:void(0)'}" target="${a.url!=='#'?'_blank':'_self'}" rel="noopener noreferrer">
        ${imgEl}
        <div class="news-card-body">
          <div class="news-meta">
            <span class="news-source" style="color:${col}">${a.site}</span>
            <span class="news-time">${timeAgo(a.publishedDate)}</span>
          </div>
          <span class="news-title">${a.title}</span>
          <p class="news-snippet">${(a.text||'').slice(0,130)}${(a.text||'').length>130?'…':''}</p>
          <div class="news-footer">${tickers}<span class="news-read">Read →</span></div>
        </div>
      </a>`;
  }

  const hero   = articles[0];
  const rest   = articles.slice(1);

  // Source breakdown bar
  const srcCount = {};
  articles.forEach(a => { srcCount[a.site] = (srcCount[a.site]||0)+1; });
  const srcBadges = Object.entries(srcCount).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([src,n]) =>
    `<span class="source-badge" style="background:${sourceColor(src)}22;color:${sourceColor(src)}">${src} <span style="opacity:.7">${n}</span></span>`
  ).join('');

  main.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:16px">
      <div>
        <span style="font-size:20px;font-weight:700">Market News</span>
        ${isDemo ? `<span style="font-size:12px;color:#f59e0b;margin-left:10px">Demo headlines — add API key for live news</span>` : `<span style="font-size:12px;color:#64748b;margin-left:10px">Refreshes every 5 min</span>`}
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        ${ago ? `<span style="font-size:11px;color:#64748b">Updated ${ago}</span>` : ''}
        <button class="refresh-btn" onclick="refreshNews()">↻ Refresh</button>
      </div>
    </div>

    <div class="news-filter-bar">${filterBtns}</div>

    ${srcBadges ? `<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;align-items:center">
      <span style="font-size:11px;color:#64748b;margin-right:2px">Sources:</span>${srcBadges}
    </div>` : ''}

    ${!articles.length ? `<div class="news-empty"><div style="font-size:40px;margin-bottom:12px">📰</div><div style="font-size:16px;font-weight:600;margin-bottom:6px">No articles found</div><div>Try a different filter or check your API key in Settings</div></div>` : `
    <div class="news-grid">
      ${hero ? articleCard(hero, true) : ''}
      ${rest.map(a => articleCard(a)).join('')}
    </div>`}`;
}

function stockNewsHTML(articles) {
  if (!articles?.length) return `<div style="color:#64748b;font-size:13px;padding:20px 0;text-align:center">No recent news found for this stock.</div>`;
  return `<div style="display:flex;flex-direction:column;gap:12px">` + articles.slice(0,8).map(a => {
    const col = sourceColor(a.site);
    return `<a class="news-card" href="${a.url!=='#'?a.url:'javascript:void(0)'}" target="${a.url!=='#'?'_blank':'_self'}" rel="noopener noreferrer" style="display:flex;gap:12px;padding:14px;text-decoration:none">
      <div style="flex:1">
        <div class="news-meta" style="margin-bottom:5px">
          <span class="news-source" style="color:${col}">${a.site}</span>
          <span class="news-time">&nbsp;·&nbsp;${timeAgo(a.publishedDate)}</span>
        </div>
        <div class="news-title" style="font-size:13px">${a.title}</div>
        <div class="news-snippet" style="margin-top:4px">${(a.text||'').slice(0,120)}${(a.text||'').length>120?'…':''}</div>
      </div>
    </a>`;
  }).join('') + `</div>`;
}

function timeAgo(dateStr) {
  const diff = Date.now() - new Date(dateStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1)  return 'Just now';
  if (m < 60) return `${m}m ago`;
  const h = Math.floor(m / 60);
  if (h < 24) return `${h}h ago`;
  return `${Math.floor(h/24)}d ago`;
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function chunkArray(arr, size) {
  const chunks = [];
  for (let i = 0; i < arr.length; i += size) chunks.push(arr.slice(i, i + size));
  return chunks;
}

// UK symbol conversion: SHEL.L ↔ SHEL:LSE  (Twelve Data uses :LSE, not .L)
function toTDSym(sym)   { return isUK(sym) ? sym.replace('.L', ':LSE') : sym; }
function fromTDSym(sym) { return sym.endsWith(':LSE') ? sym.replace(':LSE', '.L') : sym; }

// ─── TWELVE DATA — PRIMARY PRICE SOURCE ──────────────────────────────────────
async function tdFetch(path) {
  const sep = path.includes('?') ? '&' : '?';
  const url = `${TD}${path}${sep}apikey=${state.tdApiKey}`;
  const r = await fetch(url);
  if (r.status === 429) throw new Error('Rate limit hit — wait 60s and try again (free tier: 8 req/min)');
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const json = await r.json();
  if (json?.status === 'error') throw new Error(json.message || 'Twelve Data error');
  return json;
}

async function validateTdKey() {
  try {
    await tdFetch('/quote?symbol=AAPL');
    return { ok: true };
  } catch(e) { return { ok: false, message: e.message }; }
}

// Fetch quotes from Twelve Data in chunks of 20
// ONE request for all symbols — TD supports up to 120 per call, counts as 1 against rate limit
function parseTDQuotes(data) {
  const out = [];
  if (!data || typeof data !== 'object') return out;
  // Single symbol → plain object with a `symbol` field; multiple → { SYM: {...}, ... }
  const entries = data.symbol ? [[data.symbol, data]] : Object.entries(data);
  for (const [tdSym, q] of entries) {
    if (!q || q.status === 'error' || !q.close) continue;
    out.push({
      symbol:            fromTDSym(tdSym),
      name:              q.name || tdSym,
      price:             parseFloat(q.close)          || 0,
      change:            parseFloat(q.change)         || 0,
      changesPercentage: parseFloat(q.percent_change) || 0,
      volume:            parseInt(q.volume)           || 0,
      marketCap:         null,
      pe:                null,
      eps:               null,
      yearHigh:  q.fifty_two_week?.high ? parseFloat(q.fifty_two_week.high) : null,
      yearLow:   q.fifty_two_week?.low  ? parseFloat(q.fifty_two_week.low)  : null,
      exchange:  q.exchange || null,
    });
  }
  return out;
}

async function fetchBatchQuotes(symbols) {
  if (!state.tdApiKey) return [];
  try {
    // All symbols in ONE request — 1 API call regardless of symbol count
    const tdSyms = symbols.map(toTDSym).join(',');
    const data = await tdFetch(`/quote?symbol=${tdSyms}&dp=2`);
    return parseTDQuotes(data);
  } catch(e) {
    console.warn('TD batch quotes failed:', e.message);
    if (e.message.includes('429') || e.message.includes('Rate limit')) {
      showToast('⚠ Rate limit hit — prices will retry in 2 minutes', 'error');
    }
    return [];
  }
}

async function fetchTDHistory(sym, days) {
  try {
    const data = await tdFetch(`/time_series?symbol=${toTDSym(sym)}&interval=1day&outputsize=${days}`);
    if (!data?.values?.length) return null;
    return [...data.values].reverse().map(v => ({
      date:  v.datetime,
      close: parseFloat(v.close),
    }));
  } catch(e) { console.warn('TD history failed:', e.message); return null; }
}

async function apiFetch(path) {
  const url = `${FMP}${path}${path.includes('?')?'&':'?'}apikey=${state.apiKey}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  const json = await r.json();
  if (json && !Array.isArray(json)) {
    const msg = json['Error Message'] || json.message || json.error;
    if (msg) throw new Error(msg);
  }
  return json;
}

// Batch-fetch profiles for many symbols in one API call to get sector/name/beta/dividend
async function fetchBatchProfiles(symbols) {
  try {
    // Chunk profiles too — large URLs are unreliable
    const chunks = chunkArray(symbols, 15);
    const results = await Promise.allSettled(
      chunks.map(chunk => apiFetch(`/profile/${chunk.join(',')}`))
    );
    const map = {};
    results
      .filter(r => r.status === 'fulfilled' && Array.isArray(r.value))
      .flatMap(r => r.value)
      .forEach(p => {
        if (!p.symbol) return;
        map[p.symbol] = {
          sector: p.sector || null,
          industry: p.industry || null,
          description: p.description || null,
          employees: p.fullTimeEmployees || null,
          beta: p.beta || null,
          _lastDiv: p.lastDiv || 0,
          exchange: p.exchangeShortName || null,
          name: p.companyName || null,
        };
      });
    return map;
  } catch(e) { console.warn('Batch profile fetch failed:', e.message); return {}; }
}

// Fundamentals with 10-min cache — called only when a stock is individually opened
async function fetchFundamentals(sym) {
  const cached = state.fundCache[sym];
  if (cached && Date.now() - cached.ts < FUND_CACHE_MS) return cached.data;
  try {
    const [profileArr, ratiosArr, growthArr] = await Promise.all([
      apiFetch(`/profile/${sym}`),
      apiFetch(`/ratios-ttm/${sym}`),
      apiFetch(`/financial-growth/${sym}?limit=1`),
    ]);
    const p   = profileArr?.[0] || {};
    const rat = ratiosArr?.[0]  || {};
    const gr  = growthArr?.[0]  || {};

    // FMP returns ROE/ROA/margins as decimals (0.43 = 43%) — multiply by 100
    // BUT some values can be >1 legitimately (e.g. Apple ROE ~1.5 = 150%)
    function pct(v) { return v != null ? v * 100 : null; }
    // Interest coverage is already a ratio (e.g. 30.5), not a decimal
    // EV/EBITDA and P/B/P/S ratios are already in ratio form, no multiplier needed

    // dividendYield: use dividendYieldTTM from ratios (decimal → %) not lastDiv (amount)
    const divYield = rat.dividendYieldTTM != null
      ? rat.dividendYieldTTM * 100
      : (p.lastDiv && p.price ? (p.lastDiv / p.price) * 100 : null);

    const data = {
      sector: p.sector || null,
      industry: p.industry || null,
      description: p.description || null,
      employees: p.fullTimeEmployees || null,
      beta: p.beta || null,
      exchange: p.exchangeShortName || null,
      dividendYield: divYield,
      pb:              rat.priceToBookRatioTTM       ?? null,
      ps:              rat.priceToSalesRatioTTM      ?? null,
      roe:             pct(rat.returnOnEquityTTM),
      roa:             pct(rat.returnOnAssetsTTM),
      debtToEquity:    rat.debtEquityRatioTTM        ?? null,
      currentRatio:    rat.currentRatioTTM           ?? null,
      quickRatio:      rat.quickRatioTTM             ?? null,
      grossMargin:     pct(rat.grossProfitMarginTTM),
      operatingMargin: pct(rat.operatingProfitMarginTTM),
      netMargin:       pct(rat.netProfitMarginTTM),
      evToEbitda:      rat.enterpriseValueMultipleTTM ?? null,
      pfcf:            rat.priceToFreeCashFlowsRatioTTM ?? null,
      interestCoverage: rat.interestCoverageTTM      ?? null,
      // freeCashFlowPerShareTTM is per-share — store separately, don't show as total
      freeCashFlow:    null,
      revenueGrowth:   pct(gr.revenueGrowth),
      earningsGrowth:  pct(gr.netIncomeGrowth),
    };
    state.fundCache[sym] = { data, ts: Date.now() };
    return data;
  } catch(e) { console.warn('Fundamentals fetch failed:', e.message); return {}; }
}

async function fetchLiveHistory(sym, days) {
  // Prefer Twelve Data (works from browser); fall back to FMP if no TD key
  if (state.tdApiKey) return fetchTDHistory(sym, days);
  if (!state.apiKey)  return null;
  try {
    const from = new Date(Date.now() - days * 86400000).toISOString().slice(0,10);
    const data = await apiFetch(`/historical-price-full/${sym}?from=${from}`);
    const hist = (data?.historical || []).reverse();
    if (!hist.length) throw new Error('empty');
    return hist.map(h => ({ date: h.date, close: h.close }));
  } catch(e) { console.warn('FMP history failed:', e.message); return null; }
}

// ─── NEWS FETCHERS ───────────────────────────────────────────────────────────
async function fetchNews(tickers = '', limit = 20) {
  const cacheKey = tickers || 'general';
  const cached = state.newsCache[cacheKey];
  if (cached && Date.now() - cached.ts < NEWS_CACHE_MS) return cached.data;
  try {
    const tickerParam = tickers ? `&tickers=${tickers}` : '';
    const data = await apiFetch(`/stock_news?limit=${limit}${tickerParam}`);
    if (!Array.isArray(data) || !data.length) throw new Error('empty');
    state.newsCache[cacheKey] = { data, ts: Date.now() };
    return data;
  } catch(e) {
    console.warn('News fetch failed:', e.message);
    return null;
  }
}

// ─── MARKET STATUS ────────────────────────────────────────────────────────────
function isMarketOpen() {
  const now = new Date();
  // Convert to US Eastern time
  const et = new Date(now.toLocaleString('en-US', { timeZone: 'America/New_York' }));
  const day = et.getDay(); // 0=Sun, 6=Sat
  const h = et.getHours(), m = et.getMinutes();
  const mins = h * 60 + m;
  if (day === 0 || day === 6) return false;
  return mins >= 570 && mins < 960; // 9:30am–4:00pm ET
}

function updateMarketStatus() {
  const el = document.getElementById('marketStatus');
  if (!el) return;
  if (isMarketOpen()) {
    el.innerHTML = `<span class="live-badge"><span style="width:6px;height:6px;border-radius:50%;background:#10b981;animation:pulse 1.5s infinite;display:inline-block"></span>Market Open</span>`;
  } else {
    el.innerHTML = `<span class="closed-badge">Market Closed</span>`;
  }
}

function startPriceRefresh() {
  stopPriceRefresh();
  if (!state.tdApiKey) return;
  // Don't fire immediately — loadLiveMarketData already fetched batch 0
  // Start at batch 1, fire every 65s (= 8 credits/65s = well within 8/min limit)
  state.priceTimer = setInterval(refreshAllPrices, PRICE_REFRESH_MS);
}

function stopPriceRefresh() {
  if (state.priceTimer) { clearInterval(state.priceTimer); state.priceTimer = null; }
}

function startAnalysisRefresh() { /* handled by priceTimer */ }
function stopAnalysisRefresh()  { /* no-op */ }

function startClock() {
  if (state.clockTimer) clearInterval(state.clockTimer);
  state.clockTimer = setInterval(() => {
    updateLastUpdatedText();
    updateMarketStatus();
  }, 5000);
}

// Only the 7 fields that change tick-by-tick — never touches fundamentals
function applyQuotePatch(existing, q) {
  if (!q) return existing;
  const prev = existing.price;
  return {
    ...existing,
    price:         q.price,
    change:        q.change,
    changePercent: q.changesPercentage,
    volume:        q.volume,
    marketCap:     q.marketCap,
    pe:            q.pe    ?? existing.pe,
    eps:           q.eps   ?? existing.eps,
    week52High:    q.yearHigh ?? existing.week52High,
    week52Low:     q.yearLow  ?? existing.week52Low,
    _flash: q.price > prev ? 'up' : q.price < prev ? 'down' : null,
  };
}

// Single timer handler — smartly uses the 1 allowed request per 65s
// On analysis tab: refresh that specific stock (most important to user)
// On any other tab: rotate through all symbols 8 at a time
async function refreshAllPrices() {
  if (!state.tdApiKey) return;
  try {
    if (state.tab === 'analysis' && state.selectedSymbol) {
      // Refresh only the open stock — 1 credit, fast price update
      const data   = await tdFetch(`/quote?symbol=${toTDSym(state.selectedSymbol)}&dp=2`);
      const quotes = parseTDQuotes(data);
      const q      = quotes[0];
      if (q && state.selectedStock) {
        const prev      = state.selectedStock.price;
        state.selectedStock = applyQuotePatch(state.selectedStock, q);
        patchAnalysisPriceHeader(q, prev);
      }
    } else {
      // Rotate through all symbols 8 at a time — 8 credits, covers full list over time
      const ordered = buildPrioritySymbols();
      const batches = chunkArray(ordered, TD_BATCH_SIZE);
      const idx     = state.priceBatchIndex % batches.length;
      state.priceBatchIndex++;
      const tdSyms  = batches[idx].map(toTDSym).join(',');
      const data    = await tdFetch(`/quote?symbol=${tdSyms}&dp=2`);
      const quotes  = parseTDQuotes(data);
      applyBatchToState(quotes);
      const done = Math.min((idx + 1) * TD_BATCH_SIZE, ordered.length);
      const lu = document.getElementById('lastUpdated');
      if (lu) lu.textContent = `Live: ${done}/${ordered.length} stocks · refreshing every 65s`;
    }
    state.lastRefresh = Date.now();
  } catch(e) {
    if (e.message?.includes('429')) showToast('Rate limit — will resume automatically in 65s', 'info');
    console.warn('Price refresh failed:', e.message);
  }
}

// Kept for compatibility — handled by the single priceTimer now

// ─── DOM PATCHING (update prices without re-rendering entire page) ─────────────
function updatePricesInDOM(quoteMap) {
  // Patch any [data-price-sym] elements currently in the DOM
  document.querySelectorAll('[data-price-sym]').forEach(el => {
    const sym = el.dataset.priceSym;
    const q = quoteMap[sym];
    if (!q) return;
    const up = q.changesPercentage >= 0;

    const priceEl  = el.querySelector('[data-field="price"]');
    const changeEl = el.querySelector('[data-field="change"]');

    if (priceEl) {
      const prev = parseFloat(priceEl.dataset.prev || q.price);
      const flash = q.price > prev ? 'flash-up' : q.price < prev ? 'flash-down' : null;
      priceEl.textContent = fP(q.price);
      priceEl.dataset.prev = q.price;
      if (flash) { priceEl.classList.remove('flash-up','flash-down'); void priceEl.offsetWidth; priceEl.classList.add(flash); }
    }
    if (changeEl) {
      changeEl.textContent = (up?'+':'') + fPct(q.changesPercentage);
      changeEl.className = up ? 'up' : 'down';
    }
  });
}

function patchAnalysisPriceHeader(q, prevPrice) {
  const el = document.getElementById('analysisPriceBlock');
  if (!el) return;
  const up = q.changesPercentage >= 0;
  const flash = q.price > prevPrice ? 'flash-up' : q.price < prevPrice ? 'flash-down' : null;
  el.innerHTML = `
    <div class="price-big" id="livePrice" style="transition:color .3s">${fP(q.price)}</div>
    <div class="change-big ${up?'up':'down'}">${up?'+':''}${fPct(q.changesPercentage)} &nbsp;(${up?'+':''}${fP(q.change)})</div>
    <div style="font-size:11px;color:#64748b;margin-top:4px">Vol: ${fVol(q.volume)} &nbsp;·&nbsp; Updated ${new Date().toLocaleTimeString()}</div>`;
  if (flash) { el.classList.remove('flash-up','flash-down'); void el.offsetWidth; el.classList.add(flash); }
}

function updateLastUpdatedText() {
  const el = document.getElementById('lastUpdated');
  if (!el || !state.lastRefresh) return;
  const secs = Math.round((Date.now() - state.lastRefresh) / 1000);
  if (secs < 5)  el.textContent = 'Just updated';
  else if (secs < 60) el.textContent = `Updated ${secs}s ago`;
  else el.textContent = `Updated ${Math.floor(secs/60)}m ago`;
}

async function fetchLiveStock(sym) {
  try {
    const [quoteArr, profileArr, ratiosArr, growthArr] = await Promise.all([
      apiFetch(`/quote/${sym}`),
      apiFetch(`/profile/${sym}`),
      apiFetch(`/ratios-ttm/${sym}`),
      apiFetch(`/financial-growth/${sym}?limit=1`),
    ]);

    const q = quoteArr?.[0] || {};
    const p = profileArr?.[0] || {};
    const rat = ratiosArr?.[0] || {};
    const gr = growthArr?.[0] || {};

    return {
      symbol: q.symbol || sym,
      name: q.name || p.companyName || sym,
      price: q.price,
      change: q.change,
      changePercent: q.changesPercentage,
      marketCap: q.marketCap,
      volume: q.volume,
      pe: q.pe,
      eps: q.eps,
      week52High: q.yearHigh,
      week52Low: q.yearLow,
      exchange: q.exchange || p.exchangeShortName,
      sector: p.sector,
      industry: p.industry,
      description: p.description,
      employees: p.fullTimeEmployees,
      beta: p.beta,
      dividendYield: p.lastDiv,
      pb: rat.priceToBookRatioTTM,
      ps: rat.priceToSalesRatioTTM,
      roe: rat.returnOnEquityTTM != null ? rat.returnOnEquityTTM * 100 : null,
      roa: rat.returnOnAssetsTTM != null ? rat.returnOnAssetsTTM * 100 : null,
      debtToEquity: rat.debtEquityRatioTTM,
      currentRatio: rat.currentRatioTTM,
      quickRatio: rat.quickRatioTTM,
      grossMargin: rat.grossProfitMarginTTM != null ? rat.grossProfitMarginTTM * 100 : null,
      operatingMargin: rat.operatingProfitMarginTTM != null ? rat.operatingProfitMarginTTM * 100 : null,
      netMargin: rat.netProfitMarginTTM != null ? rat.netProfitMarginTTM * 100 : null,
      evToEbitda: rat.enterpriseValueMultipleTTM,
      pfcf: rat.priceToFreeCashFlowsRatioTTM,
      interestCoverage: rat.interestCoverageTTM,
      freeCashFlow: rat.freeCashFlowPerShareTTM,
      revenueGrowth: gr.revenueGrowth != null ? gr.revenueGrowth * 100 : null,
      earningsGrowth: gr.netIncomeGrowth != null ? gr.netIncomeGrowth * 100 : null,
    };
  } catch(e) {
    console.warn('Live fetch failed, falling back to demo data:', e.message);
    return null;
  }
}

async function fetchLiveHistory(sym, days) {
  try {
    const from = new Date(Date.now() - days * 86400000).toISOString().slice(0,10);
    const data = await apiFetch(`/historical-price-full/${sym}?from=${from}`);
    const hist = (data?.historical || []).reverse();
    if (!hist.length) throw new Error('empty');
    return hist.map(h => ({ date: h.date, close: h.close }));
  } catch(e) {
    console.warn('History fetch failed:', e.message);
    return null;
  }
}

  try {

    return data.map(q => ({

window.analyzeStock = async function(sym) {
  sym = sym.toUpperCase().trim();
  state.selectedSymbol = sym;
  state.analysisTab = 'overview';
  document.getElementById('analysisLabel').textContent = sym;
  document.getElementById('analysisTab').style.display = '';

  // Show loading spinner immediately
  state.selectedStock = null;
  state.selectedHistory = null;
  stopAnalysisRefresh();
  setTab('analysis');

  let quote = null, fundamentals = {};
  const hasLive = state.tdApiKey || state.apiKey;

  if (hasLive) {
    showToast(`Fetching live data for ${sym}…`, 'info');
    // Quote from Twelve Data (primary); fundamentals from FMP (optional)
    const quotePromise = state.tdApiKey
      ? fetchBatchQuotes([sym])
      : Promise.resolve([]);
    const fundPromise = state.apiKey
      ? fetchFundamentals(sym)
      : Promise.resolve({});
    const [quotes, funds] = await Promise.all([quotePromise, fundPromise]);
    quote = quotes[0] || null;
    fundamentals = funds || {};
  }

  let d;
  if (quote) {
    // Start from a clean quote entry, then layer in real fundamentals
    d = {
      ...quoteToMarketEntry(quote),
      ...fundamentals,
      // quote fields take priority over fundamentals for price/market data
      price: quote.price, change: quote.change, changePercent: quote.changesPercentage,
      marketCap: quote.marketCap, volume: quote.volume,
      pe: quote.pe, eps: quote.eps,
      week52High: quote.yearHigh, week52Low: quote.yearLow,
      exchange: fundamentals.exchange || quote.exchange,
      name: fundamentals.name || quote.name || sym,
      _livePrice: true, _liveFundamentals: true,
    };
  } else {
    d = mockStock(sym);
  }

  const {scores, details} = score(d);
  state.selectedStock = {...d, scores, details};

  // Write fundamentals back into marketData/screenerData so screener scores improve
  if (d._liveFundamentals) {
    const update = s => s.symbol === sym ? {...s, ...d, scores} : s;
    state.marketData   = state.marketData.map(update);
    state.screenerData = state.screenerData.map(update);
  }

  // Fetch price history
  let hist = null;
  if (state.apiKey) hist = await fetchLiveHistory(sym, state.chartRange);
  state.selectedHistory = hist || mockHistory(d.price, state.chartRange);

  if (state.apiKey && quote) showToast(`Live data loaded for ${sym}`, 'success');

  render();

  // Start 30s quote refresh for this stock
  startAnalysisRefresh();
};

// Shared helper — build market data from live quotes + profiles, no mock fundamentals
// Build ordered symbol list — watchlist first (user cares most), then the rest
function buildPrioritySymbols() {
  const wl = new Set(state.watchlist);
  const prioritised = [
    ...ALL_SYMBOLS.filter(s => wl.has(s)),
    ...ALL_SYMBOLS.filter(s => !wl.has(s)),
  ];
  return prioritised;
}

// Apply one batch of live quotes into marketData / screenerData
function applyBatchToState(quotes) {
  if (!quotes.length) return;
  const map = {};
  quotes.forEach(q => { if (q.symbol) map[q.symbol] = q; });
  state.marketData   = state.marketData.map(s   => applyQuotePatch(s, map[s.symbol]));
  state.screenerData = state.screenerData.map(s  => applyQuotePatch(s, map[s.symbol]));
  if (state.selectedStock && map[state.selectedStock.symbol])
    state.selectedStock = applyQuotePatch(state.selectedStock, map[state.selectedStock.symbol]);
  state.lastRefresh = Date.now();
  updatePricesInDOM(map);
  updateLastUpdatedText();
}

async function loadLiveMarketData(showToasts = false) {
  if (!state.tdApiKey) {
    if (showToasts) showToast('Add a Twelve Data key in Settings', 'info');
    return false;
  }

  // Seed market data from mock so the UI shows something immediately
  if (!state.marketData.length) {
    state.marketData   = ALL_SYMBOLS.map(s => { const d=mockStock(s); const {scores}=score(d); return {...d,scores}; });
    state.screenerData = [...state.marketData];
  }

  if (showToasts) showToast('Fetching first 8 prices…', 'info');

  // Fetch ONLY the first batch of 8 — this is the validation AND initial data in one call
  const ordered = buildPrioritySymbols();
  const firstBatch = ordered.slice(0, TD_BATCH_SIZE);
  try {
    const tdSyms = firstBatch.map(toTDSym).join(',');
    const data   = await tdFetch(`/quote?symbol=${tdSyms}&dp=2`);
    const quotes = parseTDQuotes(data);

    if (!quotes.length) {
      if (showToasts) showToast('No data returned — check your API key', 'error');
      return false;
    }

    applyBatchToState(quotes);
    state.priceBatchIndex = 1; // next rotation starts at batch 1

    const total  = ALL_SYMBOLS.length;
    const loaded = quotes.length;
    if (showToasts) showToast(
      loaded === TD_BATCH_SIZE
        ? `${loaded}/${total} stocks live ✓ — loading rest every 65s`
        : `Partial load (${loaded} stocks) — more in 65s`,
      'success'
    );
    return true;
  } catch(e) {
    const msg = e.message || 'Unknown error';
    if (showToasts) showToast(`API error: ${msg}`, 'error');
    console.error('loadLiveMarketData failed:', msg);
    return false;
  }
}

  searchInput.value='';
  dropdown.style.display='none';
  analyzeStock(sym);
};

// ─── NAV ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',()=>setTab(btn.dataset.tab));
});

// ─── TOAST ───────────────────────────────────────────────────────────────────
function showToast(msg, type='info') {
  let container = document.getElementById('toastContainer');
  if (!container) {
    container = document.createElement('div');
    container.id = 'toastContainer';
    container.style.cssText = 'position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:9999';
    document.body.appendChild(container);
  }
  const colors = { success:'#10b981', error:'#ef4444', info:'#6366f1' };
  const icons  = { success:'✓', error:'✗', info:'ℹ' };
  const toast = document.createElement('div');
  toast.style.cssText = `background:#1a1d27;border:1px solid ${colors[type]};border-left:4px solid ${colors[type]};color:#e2e8f0;padding:12px 16px;border-radius:8px;font-size:13px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,.4);max-width:320px;animation:slideIn .2s ease`;
  toast.innerHTML = `<span style="color:${colors[type]};font-weight:700">${icons[type]}</span><span>${msg}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity='0'; toast.style.transition='opacity .3s'; setTimeout(()=>toast.remove(), 300); }, 3500);
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function updateDataModeLabel() {
  const el = document.getElementById('dataMode');
  if (!el) return;
  if (state.tdApiKey)  el.textContent = '● Live (Twelve Data)';
  else if (state.apiKey) el.textContent = '○ FMP only (no prices)';
  else el.textContent = '○ Demo data';
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
updateDataModeLabel();
updateMarketStatus();
startClock();

if (state.tdApiKey) {
  (async () => {
    await loadLiveMarketData(false);
    render();
    updateLastUpdatedText();
  })();
  startPriceRefresh();
}

render();
</script>
</body>
</html>
